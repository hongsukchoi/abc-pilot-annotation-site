<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>abc pilot annotation — rendered episodes</title>
    <style>
        :root {
            --bg: #faf8f3;
            --card: #ffffff;
            --border: #d9d3c4;
            --ink: #222;
            --muted: #666;
            --accent: #2d6cdf;
            --chip: #eae4d4;
            --chip-strong: #c9bfa3;
            --special: #f3c76b;
            --ok: #8ec98e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--ink);
            font-size: 14px;
            line-height: 1.45;
        }
        header {
            padding: 18px 24px 12px;
            border-bottom: 1px solid var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 {
            margin: 0 0 4px 0;
            font-size: 18px;
            font-weight: 600;
        }
        header .meta { color: var(--muted); font-size: 13px; }
        .controls {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls input[type="search"] {
            flex: 1 1 280px;
            min-width: 180px;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
        }
        .controls select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
        }
        .controls .count {
            color: var(--muted);
            font-size: 13px;
            margin-left: auto;
        }
        #config-banner {
            padding: 8px 24px;
            background: #fff2d0;
            border-bottom: 1px solid var(--chip-strong);
            color: #6a4a00;
            font-size: 13px;
            display: none;
        }
        #config-banner.show { display: block; }
        .tabs {
            display: flex;
            gap: 0;
            margin-top: 12px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 10px 18px 9px;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: -1px;
        }
        .tab:hover { color: var(--ink); background: #f3eedf; }
        .tab.active {
            color: var(--ink);
            background: var(--bg);
            border-color: var(--border);
            border-bottom-color: var(--bg);
        }
        .tab .tab-counts {
            font-size: 11px;
            font-weight: 400;
            color: var(--muted);
            background: var(--chip);
            padding: 1px 7px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .tab.active .tab-counts {
            background: var(--chip-strong);
            color: #3a3320;
        }
        .tab.unavailable {
            opacity: 0.5;
            cursor: not-allowed;
        }
        main {
            padding: 16px 24px 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 16px 24px 32px;
            background: var(--bg);
        }
        .pagination button {
            padding: 10px 24px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        .pagination button:hover:not(:disabled) {
            background: var(--chip);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .pagination .page-info {
            font-size: 14px;
            color: var(--muted);
            min-width: 120px;
            text-align: center;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }
        .card h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
        }
        .card .subtitle {
            font-size: 12px;
            color: var(--muted);
            word-break: break-all;
        }
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--chip);
            color: #4a3d1a;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
        }
        .badge.dataset { background: #dce9f7; color: #1a3d66; }
        .badge.subtasks { background: #e0efdd; color: #1f5a2a; }
        .badge.special { background: var(--special); color: #5a3a00; }
        .badge.duration { background: var(--chip); color: #4a3d1a; }
        .video-wrap {
            position: relative;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #111;
        }
        .subtasks {
            font-size: 12px;
            background: #f6f2e7;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 8px;
        }
        .subtasks-head {
            font-weight: 500;
            color: #4a3d1a;
            margin-bottom: 4px;
        }
        .subtasks-list {
            max-height: 220px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 4px;
        }
        .subtasks-list::-webkit-scrollbar { width: 8px; }
        .subtasks-list::-webkit-scrollbar-track { background: transparent; }
        .subtasks-list::-webkit-scrollbar-thumb {
            background: #c6bfa8; border-radius: 4px;
        }
        .subtask-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 4px 4px;
            border-radius: 3px;
            cursor: pointer;
            color: var(--ink);
            line-height: 1.35;
        }
        .subtask-item:hover { background: #efe6cf; }
        .subtask-item .si-idx {
            flex: 0 0 auto;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            font-size: 11px;
            min-width: 28px;
            text-align: right;
        }
        .subtask-item .si-time {
            flex: 0 0 auto;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            font-size: 11px;
            min-width: 86px;
            font-family: ui-monospace, monospace;
        }
        .subtask-item .si-label {
            flex: 1 1 auto;
            word-break: break-word;
        }
        .subtask-item.special {
            background: rgba(243, 199, 107, 0.35);
        }
        .subtask-item.special:hover {
            background: rgba(243, 199, 107, 0.55);
        }
        .subtask-item.special .si-label {
            color: #6a4a00;
            font-weight: 500;
        }
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
        a.dl-link {
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
        }
        a.dl-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- Edit these 3 values after you create the repo + release -->
<script>
const CONFIG = {
    repoOwner: "hongsukchoi",
    repoName: "abc-pilot-annotation-site",
    releaseTag: "v1",
};
</script>

<header>
    <h1>abc pilot annotation — rendered episodes</h1>
    <div class="meta" id="meta-line">
        cameras + state/action + per-frame subtask labels.
    </div>
    <div class="tabs" id="tabs">
        <button class="tab" data-tab="finetuned">
            <span>Finetuned</span>
            <span class="tab-counts" id="counts-finetuned">…</span>
        </button>
        <button class="tab" data-tab="pretrained">
            <span>Pretrained</span>
            <span class="tab-counts" id="counts-pretrained">…</span>
        </button>
    </div>
    <div class="controls">
        <input type="search" id="q" placeholder="Search by task name, instruction, subtask, episode id…" autofocus />
        <select id="dataset-filter">
            <option value="">all datasets</option>
        </select>
        <span class="count" id="count"></span>
    </div>
</header>

<div id="config-banner">
    ⚠️ <code>CONFIG</code> in <code>index.html</code> is still set to placeholder values
    (<code>OWNER / REPO / v1</code>). Edit the <code>CONFIG</code> block at the top of
    <code>index.html</code> with your actual GitHub owner, repo name, and release tag,
    then commit &amp; push.
</div>

<main id="grid"></main>
<div class="pagination" id="pagination">
    <button id="prev-btn">&larr; Previous</button>
    <span class="page-info" id="page-info"></span>
    <button id="next-btn">Next &rarr;</button>
</div>

<script>
const TABS = {
    finetuned: {
        label: "Finetuned",
        source: "episodes.json",
        deliveryName: "abc_pilot_sample_annotation_20260416",
        releaseTag: "v1",
    },
    pretrained: {
        label: "Pretrained",
        source: "episodes_pretrained.json",
        deliveryName: "abc_pilot_pretraining_20260424",
        releaseTag: "v2",
    },
};

async function fetchTab(tabKey) {
    try {
        const res = await fetch(TABS[tabKey].source, { cache: "no-cache" });
        if (!res.ok) return null;
        return await res.json();
    } catch (err) {
        return null;
    }
}

function countTasks(data) {
    if (!data || !data.episodes) return 0;
    return new Set(data.episodes.map(e => e.task_folder || e.task_name)).size;
}

async function main() {
    // Config sanity check
    if (CONFIG.repoOwner === "OWNER" || CONFIG.repoName === "REPO") {
        document.getElementById("config-banner").classList.add("show");
    }

    // Pre-fetch both tabs to populate counts
    const [finetuned, pretrained] = await Promise.all([
        fetchTab("finetuned"),
        fetchTab("pretrained"),
    ]);
    const tabData = { finetuned, pretrained };

    function renderTabCounts(tabKey) {
        const el = document.getElementById(`counts-${tabKey}`);
        const d = tabData[tabKey];
        const tabBtn = document.querySelector(`.tab[data-tab="${tabKey}"]`);
        if (!d) {
            el.textContent = "no data yet";
            tabBtn.classList.add("unavailable");
            return;
        }
        const nTasks = countTasks(d);
        const nEps = d.episodes.length;
        el.textContent = `${nTasks} tasks · ${nEps} episodes`;
    }
    renderTabCounts("finetuned");
    renderTabCounts("pretrained");

    const grid = document.getElementById("grid");
    const count = document.getElementById("count");
    const q = document.getElementById("q");
    const dsSel = document.getElementById("dataset-filter");
    const meta = document.getElementById("meta-line");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const pageInfo = document.getElementById("page-info");
    const PAGE_SIZE = 4;
    let currentPage = 0;
    let lastFiltered = [];
    let activeTab = null;
    let data = null;

    function fmtDuration(s) {
        if (s == null) return "—";
        const m = Math.floor(s / 60);
        const sec = Math.round(s % 60);
        return `${m}:${String(sec).padStart(2, "0")}`;
    }
    function fmtClock(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m}:${sec.toFixed(1).padStart(4, "0")}`;
    }
    function fmtSize(bytes) {
        const mb = bytes / (1024 * 1024);
        return mb < 1000 ? `${mb.toFixed(1)} MB` : `${(mb / 1024).toFixed(2)} GB`;
    }
    function videoUrl(filename) {
        const tag = (activeTab && TABS[activeTab].releaseTag) || CONFIG.releaseTag;
        return `https://github.com/${CONFIG.repoOwner}/${CONFIG.repoName}` +
               `/releases/download/${tag}/${filename}`;
    }

    function filter() {
        const needle = q.value.trim().toLowerCase();
        const dsFilter = dsSel.value;
        lastFiltered = data.episodes.filter(e => {
            if (dsFilter && e.source_dataset !== dsFilter) return false;
            if (!needle) return true;
            const hay = [
                e.instruction, e.task_name, e.task_folder, e.episode_id,
                e.source_dataset,
                ...(e.subtasks || []).map(s => s.label),
            ].join(" ").toLowerCase();
            return hay.includes(needle);
        });
        currentPage = 0;
        renderPage();
    }

    function renderPage() {
        grid.innerHTML = "";
        const totalPages = Math.max(1, Math.ceil(lastFiltered.length / PAGE_SIZE));
        if (currentPage >= totalPages) currentPage = totalPages - 1;

        count.textContent = `${lastFiltered.length} / ${data.episodes.length} episodes`;

        if (lastFiltered.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "no episodes match the current filter.";
            grid.appendChild(empty);
            pageInfo.textContent = "";
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            return;
        }

        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage >= totalPages - 1;
        pageInfo.textContent = `Page ${currentPage + 1} of ${totalPages}`;

        const start = currentPage * PAGE_SIZE;
        const pageEpisodes = lastFiltered.slice(start, start + PAGE_SIZE);

        for (const e of pageEpisodes) {
            const card = document.createElement("div");
            card.className = "card";

            const url = videoUrl(e.mp4_filename);

            const title = document.createElement("h2");
            title.textContent = e.instruction || e.task_name;
            card.appendChild(title);

            const sub = document.createElement("div");
            sub.className = "subtitle";
            sub.textContent = e.episode_id;
            card.appendChild(sub);

            const badges = document.createElement("div");
            badges.className = "badges";
            badges.appendChild(makeBadge("dataset", e.source_dataset));
            badges.appendChild(makeBadge("duration", fmtDuration(e.duration_seconds)));
            badges.appendChild(makeBadge("subtasks", `${e.n_subtasks} subtasks`));
            if (e.n_special_subtasks > 0) {
                badges.appendChild(makeBadge("special", `${e.n_special_subtasks} special`));
            }
            badges.appendChild(makeBadge("", fmtSize(e.mp4_size_bytes)));
            card.appendChild(badges);

            const vwrap = document.createElement("div");
            vwrap.className = "video-wrap";
            const v = document.createElement("video");
            v.controls = true;
            v.preload = "none";
            v.src = url;
            vwrap.appendChild(v);
            card.appendChild(vwrap);

            if (e.subtasks && e.subtasks.length) {
                const box = document.createElement("div");
                box.className = "subtasks";
                const head = document.createElement("div");
                head.className = "subtasks-head";
                head.textContent =
                    `subtasks (${e.subtasks.length}) — click to seek`;
                box.appendChild(head);
                const list = document.createElement("div");
                list.className = "subtasks-list";
                e.subtasks.forEach((s, i) => {
                    const item = document.createElement("div");
                    item.className = "subtask-item" +
                        (s.is_special ? " special" : "");
                    const idx = document.createElement("span");
                    idx.className = "si-idx";
                    idx.textContent = `${i + 1}.`;
                    const time = document.createElement("span");
                    time.className = "si-time";
                    time.textContent =
                        `${fmtClock(s.start_time)}–${fmtClock(s.end_time)}`;
                    const label = document.createElement("span");
                    label.className = "si-label";
                    label.textContent = s.label;
                    item.append(idx, time, label);
                    item.addEventListener("click", () => {
                        v.currentTime = s.start_time;
                        v.play().catch(() => {});
                    });
                    list.appendChild(item);
                });
                box.appendChild(list);
                card.appendChild(box);
            }

            const dl = document.createElement("a");
            dl.className = "dl-link";
            dl.href = url;
            dl.textContent = "open video directly ↗";
            dl.target = "_blank";
            dl.rel = "noopener";
            card.appendChild(dl);

            grid.appendChild(card);
        }
    }

    function makeBadge(kind, text) {
        const b = document.createElement("span");
        b.className = "badge" + (kind ? " " + kind : "");
        b.textContent = text;
        return b;
    }

    function selectTab(tabKey) {
        if (activeTab === tabKey) return;
        const d = tabData[tabKey];
        if (!d) return;
        activeTab = tabKey;
        data = d;

        document.querySelectorAll(".tab").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.tab === tabKey);
        });

        // Update meta line
        const nTasks = countTasks(d);
        const nEps = d.episodes.length;
        meta.innerHTML =
            `${nEps} rendered videos across ${nTasks} tasks from ` +
            `<code>${TABS[tabKey].deliveryName}</code> ` +
            `(cameras + state/action + per-frame subtask labels).`;

        // Repopulate dataset filter
        dsSel.innerHTML = '<option value="">all datasets</option>';
        const datasets = [...new Set(d.episodes.map(e => e.source_dataset))].sort();
        for (const ds of datasets) {
            const opt = document.createElement("option");
            opt.value = ds;
            opt.textContent = ds;
            dsSel.appendChild(opt);
        }

        currentPage = 0;
        filter();
    }

    q.addEventListener("input", filter);
    dsSel.addEventListener("change", filter);
    prevBtn.addEventListener("click", () => { currentPage--; renderPage(); window.scrollTo(0, 0); });
    nextBtn.addEventListener("click", () => { currentPage++; renderPage(); window.scrollTo(0, 0); });
    document.addEventListener("keydown", (ev) => {
        if (ev.target.tagName === "INPUT") return;
        if (ev.key === "ArrowLeft" && !prevBtn.disabled) { currentPage--; renderPage(); window.scrollTo(0, 0); }
        if (ev.key === "ArrowRight" && !nextBtn.disabled) { currentPage++; renderPage(); window.scrollTo(0, 0); }
    });
    document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => selectTab(btn.dataset.tab));
    });

    // Pick initial tab: prefer finetuned if available, else pretrained
    const initialTab = tabData.finetuned ? "finetuned" :
                        tabData.pretrained ? "pretrained" : null;
    if (initialTab) {
        selectTab(initialTab);
    } else {
        grid.innerHTML = `<div class="empty">no episode data found. expected episodes.json or episodes_pretrained.json.</div>`;
    }
}
main().catch(err => {
    document.getElementById("grid").innerHTML =
        `<div class="empty">failed to load episodes.json: ${err}</div>`;
});
</script>

</body>
</html>
